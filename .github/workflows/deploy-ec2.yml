name: Deploy Backend To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --runInBand

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 Host
        run: |
          mkdir -p ~/.ssh
          PORT="${{ secrets.EC2_PORT }}"
          PORT="${PORT:-22}"
          ssh-keyscan -p "$PORT" "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
          DEPLOY_GIT_SHA: ${{ github.sha }}
          DEPLOY_GIT_REF: ${{ github.ref_name }}
          DEPLOY_RUN_ID: ${{ github.run_id }}
          DEPLOY_RUN_NUMBER: ${{ github.run_number }}
        run: bash ./scripts/deploy_ec2.sh
