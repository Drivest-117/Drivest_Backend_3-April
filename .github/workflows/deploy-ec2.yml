name: Deploy Backend To EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_env:
        description: Deploy target environment
        required: true
        default: prod
        type: choice
        options:
          - prod
          - dev

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --runInBand

      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 Host
        run: |
          mkdir -p ~/.ssh
          PORT="${{ secrets.EC2_PORT }}"
          PORT="${PORT:-22}"
          ssh-keyscan -p "$PORT" "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Resolve Deploy Target
        run: |
          TARGET_ENV="prod"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET_ENV="${{ inputs.deploy_env }}"
          fi

          case "$TARGET_ENV" in
            prod)
              echo "DEPLOY_ENV=prod" >> "$GITHUB_ENV"
              echo "EC2_APP_DIR=/var/www/drivest-backend" >> "$GITHUB_ENV"
              echo "PM2_APP_NAME=drivest-backend" >> "$GITHUB_ENV"
              echo "APP_PORT=3000" >> "$GITHUB_ENV"
              echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY_PROD }}" >> "$GITHUB_ENV"
              ;;
            dev)
              echo "DEPLOY_ENV=dev" >> "$GITHUB_ENV"
              echo "EC2_APP_DIR=/var/www/drivest-backend-dev" >> "$GITHUB_ENV"
              echo "PM2_APP_NAME=drivest-backend-dev" >> "$GITHUB_ENV"
              echo "APP_PORT=3001" >> "$GITHUB_ENV"
              echo "STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY_DEV }}" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported deploy target: $TARGET_ENV" >&2
              exit 1
              ;;
          esac

      - name: Deploy
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
          EC2_APP_DIR: ${{ env.EC2_APP_DIR }}
          DEPLOY_ENV: ${{ env.DEPLOY_ENV }}
          PM2_APP_NAME: ${{ env.PM2_APP_NAME }}
          APP_PORT: ${{ env.APP_PORT }}
          DEPLOY_GIT_SHA: ${{ github.sha }}
          DEPLOY_GIT_REF: ${{ github.ref_name }}
          DEPLOY_RUN_ID: ${{ github.run_id }}
          DEPLOY_RUN_NUMBER: ${{ github.run_number }}
          STRIPE_SECRET_KEY: ${{ env.STRIPE_SECRET_KEY }}
          STRIPE_LESSON_CHECKOUT_SUCCESS_URL: drivest://lesson-payment/success?session_id={CHECKOUT_SESSION_ID}
          STRIPE_LESSON_CHECKOUT_CANCEL_URL: drivest://lesson-payment/cancel
        run: bash ./scripts/deploy_ec2.sh
