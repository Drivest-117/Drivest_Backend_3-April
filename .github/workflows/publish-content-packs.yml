name: Publish Content Packs

on:
  workflow_dispatch:
    inputs:
      publish_mode:
        description: Choose whether to preview or publish content-pack changes
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - apply
      content_target:
        description: Select which content target to publish
        required: true
        default: traffic-sign-images
        type: choice
        options:
          - traffic-sign-images

permissions:
  contents: read
  id-token: write

jobs:
  publish-traffic-sign-images:
    if: ${{ inputs.content_target == 'traffic-sign-images' }}
    runs-on: ubuntu-latest

    env:
      CONTENT_PACK_S3_BUCKET: ${{ vars.CONTENT_PACK_S3_BUCKET || 'contentpackages' }}
      CONTENT_PACK_S3_REGION: ${{ vars.CONTENT_PACK_S3_REGION || 'eu-north-1' }}
      AWS_REGION: ${{ vars.AWS_REGION || vars.CONTENT_PACK_S3_REGION || 'eu-north-1' }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      DB_SSL: ${{ secrets.DB_SSL }}
      DB_SSL_REJECT_UNAUTHORIZED: ${{ secrets.DB_SSL_REJECT_UNAUTHORIZED }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      IOS_SOURCE_ROOT: ./ios-source/DrivestNavigation/Resources/Data/trafficsigns
      TRAFFIC_SIGN_INDEX_SUMMARY_PATH: ./content-assets/traffic_sign_images/index-summary.json
      TRAFFIC_SIGN_UPLOAD_PLAN_PATH: ./content-assets/traffic_sign_images/upload-plan.json
      TRAFFIC_SIGN_MANIFEST_PLAN_PATH: ./content-assets/traffic_sign_images/manifest-plan.json

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout iOS Source Repo
        uses: actions/checkout@v5
        with:
          repository: Drivest2026/drivest-ios
          path: ios-source
          token: ${{ secrets.IOS_REPO_READ_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Validate iOS Source Availability
        run: |
          if [ -z "${{ secrets.IOS_REPO_READ_TOKEN }}" ]; then
            echo "Missing IOS_REPO_READ_TOKEN secret for checkout of Drivest2026/drivest-ios." >&2
            exit 1
          fi
          if [ ! -d "$IOS_SOURCE_ROOT" ]; then
            echo "Traffic sign source root not found at $IOS_SOURCE_ROOT" >&2
            exit 1
          fi

      - name: Build Traffic Sign Index
        run: |
          node ./scripts/build-traffic-sign-image-index.js --root="$IOS_SOURCE_ROOT" | tee "$TRAFFIC_SIGN_INDEX_SUMMARY_PATH"

      - name: Configure AWS Credentials With OIDC
        if: ${{ inputs.publish_mode == 'apply' && vars.AWS_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS Credentials With Static Secrets
        if: ${{ inputs.publish_mode == 'apply' && vars.AWS_ROLE_ARN == '' && env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ env.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate Apply Prerequisites
        if: ${{ inputs.publish_mode == 'apply' }}
        run: |
          if [ -z "${{ vars.AWS_ROLE_ARN }}" ] && { [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; }; then
            echo "Missing AWS authentication for apply mode." >&2
            exit 1
          fi
          if [ -z "$DATABASE_URL" ]; then
            echo "Missing DATABASE_URL secret for apply mode." >&2
            exit 1
          fi

      - name: Preview Upload Plan
        if: ${{ inputs.publish_mode == 'dry-run' }}
        run: |
          node ./scripts/upload-traffic-sign-image-assets-s3.js --dry-run --root="$IOS_SOURCE_ROOT" | tee "$TRAFFIC_SIGN_UPLOAD_PLAN_PATH"

      - name: Preview Manifest Row
        if: ${{ inputs.publish_mode == 'dry-run' }}
        run: |
          node ./scripts/seed-traffic-sign-image-manifest.js --dry-run | tee "$TRAFFIC_SIGN_MANIFEST_PLAN_PATH"

      - name: Upload Traffic Sign Images
        if: ${{ inputs.publish_mode == 'apply' }}
        run: node ./scripts/upload-traffic-sign-image-assets-s3.js --apply --root="$IOS_SOURCE_ROOT"

      - name: Apply Manifest Row
        if: ${{ inputs.publish_mode == 'apply' }}
        run: node ./scripts/seed-traffic-sign-image-manifest.js --apply

      - name: Write Workflow Summary
        if: ${{ always() }}
        run: |
          node <<'NODE'
          const fs = require('fs');

          function readJson(path) {
            if (!fs.existsSync(path)) return null;
            try {
              return JSON.parse(fs.readFileSync(path, 'utf8'));
            } catch {
              return null;
            }
          }

          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const mode = process.env.PUBLISH_MODE;
          const target = process.env.CONTENT_TARGET;
          const indexSummary = readJson(process.env.TRAFFIC_SIGN_INDEX_SUMMARY_PATH);
          const uploadPlan = readJson(process.env.TRAFFIC_SIGN_UPLOAD_PLAN_PATH);
          const manifestPlan = readJson(process.env.TRAFFIC_SIGN_MANIFEST_PLAN_PATH);

          const lines = [];
          lines.push('# Content Pack Run Summary');
          lines.push('');
          lines.push(`- Mode: \`${mode}\``);
          lines.push(`- Target: \`${target}\``);

          if (indexSummary) {
            lines.push(`- Indexed files: \`${indexSummary.fileCount}\``);
            lines.push(`- Source root: \`${indexSummary.sourceRoot}\``);
            lines.push(`- Version: \`${indexSummary.version}\``);
          }

          if (uploadPlan) {
            lines.push(`- Upload bucket: \`${uploadPlan.bucket}\``);
            lines.push(`- Upload prefix: \`${uploadPlan.prefix}\``);
            lines.push(`- Upload size: \`${uploadPlan.totalSizeMB} MB\``);
          }

          if (manifestPlan && manifestPlan.row) {
            lines.push(`- Manifest version: \`${manifestPlan.row.version}\``);
            lines.push(`- Manifest URL: \`${manifestPlan.row.url}\``);
          }

          lines.push('');
          fs.appendFileSync(summaryPath, lines.join('\n') + '\n');
          NODE
        env:
          PUBLISH_MODE: ${{ inputs.publish_mode }}
          CONTENT_TARGET: ${{ inputs.content_target }}
